<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【Welkin Art】維科數位創藝｜3D幾何模型 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { margin:0; font-family:"Microsoft JhengHei",sans-serif; background:#111; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        header { background:#1a1a1a; padding:12px; text-align:center; font-size:22px; font-weight:bold; border-bottom:2px solid #444; }
        .main { flex:1; display:flex; }
        #canvas-container { flex:1; background:#000; position:relative; overflow:hidden; }
        #three-canvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }
        .sidebar { width:320px; background:#1a1a1a; padding:20px; overflow-y:auto; border-left:2px solid #444; }
        .section { margin-bottom:24px; }
        .section h3 { margin:0 0 12px 0; color:#0ff; font-size:18px; border-bottom:1px solid #333; padding-bottom:6px; }
        label { display:block; margin:12px 0 6px; font-size:15px; }
        input[type="checkbox"] { margin-right:8px; transform:scale(1.3); }
        .slider-container { display:flex; align-items:center; gap:10px; }
        input[type="range"] { flex:1; accent-color:#0ff; }
        .value { width:50px; text-align:right; font-family:monospace; color:#0ff; }
        button { background:#0ff; color:#000; border:none; padding:10px 20px; margin-top:12px; cursor:pointer; font-weight:bold; border-radius:4px; }
        button:hover { background:#0cc; }
        .info { font-size:13px; color:#aaa; margin-top:20px; line-height:1.5; }
    </style>
</head>
<body>
    <header>【Welkin Art】課程用線上3D模型</header>
    <div class="main">
        <div id="canvas-container">
            <canvas id="three-canvas"></canvas>
        </div>

        <div class="sidebar">
            <div class="section">
                <h3>模型選擇</h3>
                <label><input type="checkbox" id="show-sphere" checked> 球體</label>
                <label style="margin-top:18px; color:#0f0;">
                    <input type="checkbox" id="show-reference" checked> 顯示球體參考座標
                </label>

                <label><input type="checkbox" id="show-cube" checked> 立方體</label>
                <label><input type="checkbox" id="show-cylinder" checked> 圓柱</label>
                <label><input type="checkbox" id="show-prism" checked> 三角柱 </label>


            </div>

            <div class="section">
                <h3>模型調整</h3>
                <label>模型縮放　<span id="scale-val" class="value">1.0</span></label>
                <div class="slider-container">
                    <input type="range" id="scale-slider" min="0.4" max="3" step="0.05" value="1">
                </div>

                <label>透明度　<span id="opacity-val" class="value">0.9</span></label>
                <div class="slider-container">
                    <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.9">
                </div>
            </div>

            <div class="section">
    
                <label>鏡頭距離　<span id="dist-val" class="value">6.0</span></label>
                <div class="slider-container">
                    <input type="range" id="dist-slider" min="2" max="15" step="0.2" value="6">
                </div>

                <label>視野（FOV）　<span id="fov-val" class="value">70</span></label>
                <div class="slider-container">
                    <input type="range" id="fov-slider" min="20" max="110" step="1" value="70">
                </div>
            </div>

            <button onclick="resetAll()">重置全部</button>

            <div class="info">
                本模型僅提供課程內使用。<br>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 100);
        camera.position.set(0, 0, 6);

        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(10, 12, 8);
        scene.add(dirLight);

        const sceneGroup = new THREE.Group();
        scene.add(sceneGroup);

        const models = {};

        // 材質工廠函式
        function createMeshMaterial(opacity = 0.9) {
            return new THREE.MeshPhongMaterial({
                color: 0xffffff,
                shininess: 25,
                transparent: true,
                opacity: opacity,
                side: THREE.DoubleSide
            });
        }

        // 參考框架：三個正交大圓 + xyz軸
        function createReferenceFrame(scale = 1) {
            const group = new THREE.Group();
            const circleMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 3 });
            const axisMatBase = new THREE.LineBasicMaterial({ linewidth: 2.5 });

            const seg = 64;
            const r = 1.00 * scale;

            // XY
            let curve = new THREE.EllipseCurve(0,0,r,r,0,Math.PI*2);
            let geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(seg));
            group.add(new THREE.Line(geo, circleMat));

            // XZ
            geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(seg));
            let line = new THREE.Line(geo, circleMat);
            line.rotation.x = Math.PI / 2;
            group.add(line);

            // YZ
            geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(seg));
            line = new THREE.Line(geo, circleMat);
            line.rotation.y = Math.PI / 2;
            group.add(line);

            // 軸線
            const alen = 1.4 * scale;
            const axes = [
                { dir: new THREE.Vector3(alen, 0, 0), color: 0xff5050 }, // x 紅
                { dir: new THREE.Vector3(0, alen, 0), color: 0x50ff50 }, // y 綠
                { dir: new THREE.Vector3(0, 0, alen), color: 0x5050ff }  // z 藍
            ];

            axes.forEach(a => {
                const pts = [new THREE.Vector3(0,0,0), a.dir];
                const g = new THREE.BufferGeometry().setFromPoints(pts);
                const l = new THREE.Line(g, axisMatBase.clone());
                l.material.color.set(a.color);
                group.add(l);
            });

            return group;
        }

        // 模型建立
        function createModel(type) {
            let mesh, refScale = 1;

            if (type === 'sphere') {
                const geo = new THREE.SphereGeometry(1, 48, 32);
                mesh = new THREE.Mesh(geo, createMeshMaterial());
                refScale = 1;
            } else if (type === 'cube') {
                const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
                mesh = new THREE.Mesh(geo, createMeshMaterial());
                refScale = 1.8 * Math.sqrt(3)/2;
            } else if (type === 'cylinder') {
                const geo = new THREE.CylinderGeometry(0.9, 0.9, 2.4, 48);
                mesh = new THREE.Mesh(geo, createMeshMaterial());
                refScale = 0.95;
            } else if (type === 'prism') {
                const shape = new THREE.Shape();
                shape.moveTo(-1.0, 0.6);
                shape.lineTo(1.0, 0.6);
                shape.lineTo(0.0, -0.8);
                const extrude = { depth: 1.2, bevelEnabled: false };
                const geo = new THREE.ExtrudeGeometry(shape, extrude);
                geo.translate(0, 0, -0.6);
                mesh = new THREE.Mesh(geo, createMeshMaterial());
                refScale = 1.15;
            }

            const group = new THREE.Group();
            group.add(mesh);
            const refFrame = createReferenceFrame(refScale);
            group.add(refFrame);
            group.userData.refFrame = refFrame;  // 明確儲存參考

            return { mesh, group, refFrame };
        }

        function initModels() {
            models.sphere   = createModel('sphere');   sceneGroup.add(models.sphere.group);
            models.cube     = createModel('cube');     sceneGroup.add(models.cube.group);
            models.cylinder = createModel('cylinder'); sceneGroup.add(models.cylinder.group);
            models.prism    = createModel('prism');    sceneGroup.add(models.prism.group);
sceneGroup.position.y = 0.5;
        }

        // 控制
        let isDragging = false;
        let prevX = 0, prevY = 0;

        function initControls() {
            const container = document.getElementById('canvas-container');

            container.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                isDragging = true;
                prevX = e.clientX;
                prevY = e.clientY;
                container.style.cursor = 'grabbing';
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'grab';
            });

            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                const dx = (e.clientX - prevX) * 0.005;
                const dy = (e.clientY - prevY) * 0.005;
                sceneGroup.rotation.y += dx;
                sceneGroup.rotation.x += dy;
                prevX = e.clientX;
                prevY = e.clientY;
            });

            // 顯示勾選
            document.getElementById('show-sphere').onchange   = e => models.sphere.group.visible   = e.target.checked;
            document.getElementById('show-cube').onchange     = e => models.cube.group.visible     = e.target.checked;
            document.getElementById('show-cylinder').onchange = e => models.cylinder.group.visible = e.target.checked;
            document.getElementById('show-prism').onchange    = e => models.prism.group.visible    = e.target.checked;

            document.getElementById('show-reference').onchange = e => {
                const v = e.target.checked;
                Object.values(models).forEach(m => {
                    if (m.refFrame) m.refFrame.visible = v;
                });
            };

            // 滑桿
            const sliders = {
                scale:   { el: 'scale-slider',   val: 'scale-val',   fn: v => sceneGroup.scale.set(v,v,v) },
                opacity: { el: 'opacity-slider', val: 'opacity-val', fn: v => Object.values(models).forEach(m => m.mesh.material.opacity = v) },
                dist:    { el: 'dist-slider',    val: 'dist-val',    fn: v => camera.position.z = v },
                fov:     { el: 'fov-slider',     val: 'fov-val',     fn: v => { camera.fov = v; camera.updateProjectionMatrix(); } }
            };

            Object.keys(sliders).forEach(k => {
                const s = document.getElementById(sliders[k].el);
                s.oninput = () => {
                    const v = parseFloat(s.value);
                    document.getElementById(sliders[k].val).textContent = k === 'opacity' ? v.toFixed(2) : (k === 'scale' ? v.toFixed(1) : (k === 'dist' ? v.toFixed(1) : v));
                    sliders[k].fn(v);
                };
            });
        }

        function resetAll() {
            document.getElementById('scale-slider').value = 1;
            document.getElementById('opacity-slider').value = 0.9;
            document.getElementById('dist-slider').value = 6;
            document.getElementById('fov-slider').value = 70;
            sceneGroup.rotation.set(0,0,0);
            ['scale','opacity','dist','fov'].forEach(k => document.getElementById(k+'-slider').dispatchEvent(new Event('input')));
        }

        // Resize
        function resize() {
            const w = canvasContainer.clientWidth;
            const h = canvasContainer.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', resize);

        // 動畫
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // 啟動
        const canvasContainer = document.getElementById('canvas-container');
        initModels();
        initControls();
        resize();
        // 初始套用滑桿值
        ['scale','opacity','dist','fov'].forEach(k => document.getElementById(k+'-slider').dispatchEvent(new Event('input')));
        animate();
    </script>
</body>
</html>
