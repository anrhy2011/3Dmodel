<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【Welkin Art】維科數位創藝｜課用3D幾何模型</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { 
            margin:0; 
            font-family:"Microsoft JhengHei",sans-serif; 
            background:#111; 
            color:#fff; 
            display:flex; 
            flex-direction:column; 
            height:100vh; 
            overflow:hidden; 
        }
        header { 
            background:#1a1a1a; 
            padding:12px; 
            text-align:center; 
            font-size:22px; 
            font-weight:bold; 
            border-bottom:2px solid #444; 
        }
        .main { flex:1; display:flex; }
        #canvas-container { 
            flex:1; 
            background:#000; 
            position:relative; 
            overflow:hidden; 
            touch-action: none;   /* 只在畫布區域禁止預設觸控 */
        }
        #three-canvas { 
            position:absolute; 
            top:0; left:0; 
            width:100%; 
            height:100%; 
            display:block; 
        }
        .sidebar { 
            width:320px; 
            background:#1a1a1a; 
            padding:20px; 
            overflow-y:auto; 
            border-left:2px solid #444; 
            touch-action: auto;   /* 側邊欄允許正常觸控 */
        }
        .section { margin-bottom:24px; }
        .section h3 { margin:0 0 12px 0; color:#fff; font-size:18px; border-bottom:1px solid #333; padding-bottom:6px; }
        label { display:block; margin:12px 0 6px; font-size:15px; user-select:none; -webkit-user-select:none; }
        input[type="checkbox"] { margin-right:8px; transform:scale(1.3); }
        .slider-container { display:flex; align-items:center; gap:10px; }
        input[type="range"] { flex:1; accent-color:#fff; }
        .value { width:50px; text-align:right; font-family:monospace; color:#fff; }
        button { background:#fff; color:#000; border:none; padding:10px 20px; margin-top:12px; cursor:pointer; font-weight:bold; border-radius:4px; }
        button:hover { background:#fff; }
        .info { font-size:13px; color:#aaa; margin-top:20px; line-height:1.5; }
    </style>
</head>
<body>
    <header>【Welkin Art】維科數位創藝｜3D幾何模型 </header>
    <div class="main">
        <div id="canvas-container">
            <canvas id="three-canvas"></canvas>
        </div>

        <div class="sidebar">            <div class="section">
                <h3>模型選擇</h3>
                <label><input type="checkbox" id="show-cube"     checked> 立方體</label>
                <label><input type="checkbox" id="show-cylinder" checked> 圓柱</label>
                <label><input type="checkbox" id="show-sphere"   checked> 球體</label>
                <label><input type="checkbox" id="show-prism"    checked> 三角柱</label>

                <label style="margin-top:18px; color:#0f0;">
                    <input type="checkbox" id="show-aux" checked> 顯示輔助線
                </label>
            </div>

            <div class="section">
                <h3>模型調整</h3>
                <label>方塊大小　<span id="scale-val" class="value">0.5</span></label>
                <div class="slider-container">
                    <input type="range" id="scale-slider" min="0.4" max="3" step="0.05" value="0.5">
                </div>

                <label>透明度　<span id="opacity-val" class="value">0.3</span></label>
                <div class="slider-container">
                    <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.3">
                </div>
                <label>距離　<span id="dist-val" class="value">6.0</span></label>
                <div class="slider-container">
                    <input type="range" id="dist-slider" min="3" max="30" step="0.2" value="6">
                </div>

                <label>畫布縮放　<span id="fov-val" class="value">40</span></label>
                <div class="slider-container">
                    <input type="range" id="fov-slider" min="20" max="150" step="1" value="40">
                </div>
            </div>


            <button onclick="resetAll()">還原初始設定</button>

            <div class="info">
                本模型僅供課程內使用。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 100);
        camera.position.set(0, 0, 7);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
        dirLight.position.set(8, 10, 6);
        scene.add(dirLight);

        const sceneGroup = new THREE.Group();
        sceneGroup.position.y = 0.5;
        scene.add(sceneGroup);

        const models = {};


        function createMeshMaterial(opacity = 0.3) {
            return new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 30, transparent: true, opacity, side: THREE.DoubleSide });
        }

        function createAxisFrame(scale = 1) {
            const group = new THREE.Group();
            const mat = new THREE.LineBasicMaterial({ linewidth: 3 });
            const len = 1.45 * scale;
            const axes = [
                { dir: [len,0,0], col: 0xff5050 },
                { dir: [0,len,0], col: 0x50ff50 },
                { dir: [0,0,len], col: 0xffff50 }
            ];
            axes.forEach(a => {
                const pts = [new THREE.Vector3(), new THREE.Vector3(...a.dir)];
                const g = new THREE.BufferGeometry().setFromPoints(pts);
                const l = new THREE.Line(g, mat.clone());
                l.material.color.set(a.col);
                group.add(l);
            });
            return group;
        }

        function createCircleEdge(radius, y = 0) {
            const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, Math.PI * 2, false);
            const points = curve.getPoints(72);
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 4.5 });
            const line = new THREE.Line(geo, mat);
            line.position.y = y;
            return line;
        }

        function createModel(type) {
            let mesh, auxGroup = new THREE.Group();












        // 球－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－


            if (type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 32), createMeshMaterial());
                const r = 1.0;
                const seg = 72;
                const circleMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 4 });
                const addCircle = (rotX = 0, rotY = 0) => {
                    const curve = new THREE.EllipseCurve(0,0,r,r,0,Math.PI*2);
                    const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(seg));
                    const line = new THREE.Line(geo, circleMat);
                    line.rotation.x = rotX;
                    line.rotation.y = rotY;
                    auxGroup.add(line);
                };
                addCircle();
                addCircle(Math.PI/2);
                addCircle(0, Math.PI/2);
                auxGroup.add(createAxisFrame(1));
            }


        // 方塊－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－


            else if (type === 'cube') {
                const size = 2.0;
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), createMeshMaterial());
                auxGroup.add(new THREE.LineSegments(
                    new THREE.EdgesGeometry(mesh.geometry),
                    new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 4 })
                ));
                auxGroup.add(createAxisFrame(size * 0.0));
            }



        // 圓柱－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－


else if (type === 'cylinder') {

    const radius = 1.0;
    const height = 2.01;

    mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, height, 48), createMeshMaterial());

    const r = radius;
    const seg = 72;

    const circleMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 4 });

    const addCircle = (rotX = 0, rotY = 0, y = 0) => {

        const curve = new THREE.EllipseCurve(0,0,r,r,0,Math.PI*2);
        const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(seg));

        const line = new THREE.Line(geo, circleMat);

        line.rotation.x = rotX;
        line.rotation.y = rotY;
        line.position.y = y;

        auxGroup.add(line);
    };

    // 中央水平圓
    addCircle(Math.PI/2,0,0);
    addCircle(Math.PI/2,0,height/2);
    addCircle(Math.PI/2,0,-height/2);




    const mat = new THREE.LineBasicMaterial({ color: 0x00ffff });

    const h = height / 2;

    const pts = [

        // 上面X
        [-radius, h, -0], [ radius, h,  0],
        [ 0, h, -radius], [-0, h,  radius],

        [-radius/1.42, h,-radius/1.42], [ radius/1.42, h, radius/1.42],
        [ radius/1.42, h,-radius/1.42], [-radius/1.42, h, radius/1.42],


        // 下面X
        [-radius, -h, -0], [ radius, -h,  0],
        [ 0, -h, -radius], [-0, -h,  radius],

        [-radius/1.42, -h,-radius/1.42], [ radius/1.42, -h, radius/1.42],
        [ radius/1.42, -h,-radius/1.42], [-radius/1.42, -h, radius/1.42],

        // 四條垂直線
        [-radius,-h,-0], [-radius, h,-0],
        [ 0,-h,-radius], [ 0, h,-radius],
        [ radius,-h, 0], [ radius, h, 0],
        [ 0,-h, radius], [ 0, h, radius],

        [-radius/1.414,-h,-radius/1.414], [-radius/1.414, h,-radius/1.414],
        [ radius/1.414,-h,-radius/1.414], [ radius/1.414, h,-radius/1.414],
        [-radius/1.414,-h, radius/1.414], [-radius/1.414, h, radius/1.414],
        [ radius/1.414,-h, radius/1.414], [ radius/1.414, h, radius/1.414],



    ];

    const geo = new THREE.BufferGeometry().setFromPoints(
        pts.map(p=>new THREE.Vector3(...p))
    );

    const lines = new THREE.LineSegments(geo, mat);


    auxGroup.add(lines);






    auxGroup.add(createAxisFrame(radius * 0));
}




        // 三角柱－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－－



            else if (type === 'prism') {
                const shape = new THREE.Shape();
                shape.moveTo(-1.0, 0.6);
                shape.lineTo(1.0, 0.6);
                shape.lineTo(0.0, -0.8);
                const geo = new THREE.ExtrudeGeometry(shape, { depth: 1.0, bevelEnabled: false });
                geo.translate(0, 0, -0.6);
                mesh = new THREE.Mesh(geo, createMeshMaterial());
                auxGroup.add(new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 4 })
                ));
                auxGroup.add(createAxisFrame(0));
            }

            const group = new THREE.Group();
            group.add(mesh);
            group.add(auxGroup);
            group.userData.aux = auxGroup;

            return { mesh, group };
        }





































        function initModels() {
            models.sphere   = createModel('sphere');   sceneGroup.add(models.sphere.group);
            models.cube     = createModel('cube');     sceneGroup.add(models.cube.group);
            models.cylinder = createModel('cylinder'); sceneGroup.add(models.cylinder.group);
            models.prism    = createModel('prism');    sceneGroup.add(models.prism.group);
        }

        function initControls() {
            const container = document.getElementById('canvas-container');

            let isDragging = false;
            let prevX = 0;
            let prevY = 0;

            const onPointerDown = (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                isDragging = true;
                prevX = e.clientX;
                prevY = e.clientY;
                container.setPointerCapture(e.pointerId);
                e.preventDefault();
            };

            const onPointerMove = (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - prevX) * 0.005;
                const dy = (e.clientY - prevY) * 0.005;
                sceneGroup.rotation.y += dx;
                sceneGroup.rotation.x += dy;
                prevX = e.clientX;
                prevY = e.clientY;
                e.preventDefault();
            };

            const onPointerUp = (e) => {
                isDragging = false;
                container.releasePointerCapture(e.pointerId);
                e.preventDefault();
            };

            // pointer events 處理滑鼠 + 觸控
            container.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('pointercancel', onPointerUp);

            // 額外防止觸控滾動（只針對畫布）
            container.addEventListener('touchstart', e => { if (e.touches.length === 1) e.preventDefault(); }, { passive: false });
            container.addEventListener('touchmove', e => { if (e.touches.length === 1) e.preventDefault(); }, { passive: false });

            // 勾選與滑桿事件
            document.getElementById('show-sphere')  .onchange = e => models.sphere.group.visible   = e.target.checked;
            document.getElementById('show-cube')    .onchange = e => models.cube.group.visible     = e.target.checked;
            document.getElementById('show-cylinder').onchange = e => models.cylinder.group.visible = e.target.checked;
            document.getElementById('show-prism')   .onchange = e => models.prism.group.visible    = e.target.checked;

            document.getElementById('show-aux').onchange = e => {
                const v = e.target.checked;
                Object.values(models).forEach(m => { if (m.group.userData.aux) m.group.userData.aux.visible = v; });
            };

            const s = id => document.getElementById(id);
            s('scale-slider').oninput = () => {
                const v = +s('scale-slider').value;
                s('scale-val').textContent = v.toFixed(1);
                sceneGroup.scale.set(v,v,v);
            };
            s('opacity-slider').oninput = () => {
                const v = +s('opacity-slider').value;
                s('opacity-val').textContent = v.toFixed(2);
                Object.values(models).forEach(m => m.mesh.material.opacity = v);
            };
            s('dist-slider').oninput = () => {
                const v = +s('dist-slider').value;
                s('dist-val').textContent = v.toFixed(1);
                camera.position.z = v;
            };
            s('fov-slider').oninput = () => {
                const v = +s('fov-slider').value;
                s('fov-val').textContent = v;
                camera.fov = v; camera.updateProjectionMatrix();
            };
        }

        function resetAll() {
            ['scale','opacity','dist','fov'].forEach(k => {
                const el = document.getElementById(k+'-slider');
                el.value = el.defaultValue;
                el.dispatchEvent(new Event('input'));
            });
            sceneGroup.rotation.set(0,0,0);
        }

        function resize() {
            const w = document.getElementById('canvas-container').clientWidth;
            const h = document.getElementById('canvas-container').clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        initModels();
        initControls();
        resize();
        ['scale','opacity','dist','fov'].forEach(k => document.getElementById(k+'-slider').dispatchEvent(new Event('input')));
        animate();
    </script>
</body>
</html>
